apiVersion: apps/v1
kind: Deployment
metadata:
  name: animals-deployment
  labels:
    app: animals
    visual: portfolio
spec:
  replicas: 5
  selector:
    matchLabels:
      app: animals
  template:
    metadata:
      labels:
        app: animals
    spec:
      containers:
      - name: animal-container
        image: supergiantkir/animals:bear
        ports:
        - containerPort: 80

---

apiVersion: v1
kind: Service
metadata:
  name: animals-service
spec:
  type: LoadBalancer
  selector:
    app: animals
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
